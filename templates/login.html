<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <title>Login | Indicadores</title>
    <style>
        body { background: #f0f2f5; }
        .login-card { max-width: 420px; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="login-card w-100 px-3">

        <div class="text-center mb-4">
            <i class="bi bi-server text-primary" style="font-size:3rem;"></i>
            <h4 class="fw-bold mt-2 mb-0">Indicadores de Servidores</h4>
            <p class="text-muted small">Faça login para continuar</p>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">

                {% if erro %}
                <div class="alert alert-danger alert-dismissible fade show py-2" role="alert">
                    <i class="bi bi-exclamation-triangle me-1"></i> {{ erro }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endif %}

                <form method="post" autocomplete="off">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label fw-semibold">Usuário</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" id="id_username" name="username"
                                   class="form-control" placeholder="seu.usuario"
                                   autofocus required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="id_password" class="form-label fw-semibold">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" id="id_password" name="password"
                                   class="form-control" placeholder="••••••••" required>
                        </div>
                        <div class="form-text text-muted">
                            A senha é validada pelo servidor LDAP.
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
                    </button>
                </form>

            </div>
        </div>

        <div class="text-center mt-3">
            <a href="{% url 'ind:boas_vindas' %}" class="text-muted small text-decoration-none">
                <i class="bi bi-arrow-left me-1"></i> Voltar à apresentação
            </a>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
