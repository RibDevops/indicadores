<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <title>{% block title %}{% endblock %} | Indicadores</title>
    <style>
        @media (min-width: 992px) { body { padding-right: 230px; } }
        @media (max-width: 991.98px) { main { padding-bottom: 90px !important; } }

        body.dark-mode { background-color: #212529; color: #f8f9fa; }
        body.dark-mode .card { background-color: #2b3035; border-color: #444; }
        body.dark-mode .table { color: #f8f9fa; }
        body.dark-mode .table-light th { background-color: #343a40 !important; color: #f8f9fa; }
        body.dark-mode .table-hover tbody tr:hover { background-color: rgba(255,255,255,.05); }
        body.dark-mode .form-control,
        body.dark-mode .form-select { background-color: #343a40; color: #f8f9fa; border-color: #555; }
        body.dark-mode .text-muted { color: #adb5bd !important; }

        .form-control:focus, .form-select:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.2rem rgba(13,110,253,.25);
        }
        textarea { resize: none; }

        /* Preloader */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255,255,255,.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity .3s ease-out, visibility .3s ease-out;
        }
        body.dark-mode #preloader { background-color: rgba(33,37,41,.95); }
        .loader {
            width: 60px; height: 60px; border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: #0d6efd;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Hamburger FAB */
        .hamburger-fab {
            position: fixed; bottom: 24px; right: 24px; z-index: 1055;
            width: 56px; height: 56px; border-radius: 50%;
            background: #0d6efd; border: none;
            box-shadow: 0 4px 16px rgba(13,110,253,.45);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: background .2s, transform .15s;
        }
        .hamburger-fab:hover { background: #0b5ed7; }
        .hamburger-fab:active { transform: scale(.93); }
        .hamburger-icon { display: flex; flex-direction: column; gap: 5px; width: 22px; }
        .hamburger-icon span { display: block; height: 2.5px; border-radius: 2px; background: #fff; width: 100%; }

        /* Sidebar links */
        .sidebar-link { transition: background .15s; border-radius: 0; }
        .sidebar-link:hover, .sidebar-link.active { background: rgba(255,255,255,.1); color: #fff !important; }
        .sidebar-link.active { border-left: 3px solid #0d6efd; }
    </style>
</head>
<body>
    <!-- Preloader -->
    <div id="preloader"><div class="loader"></div></div>

    <!-- Navbar / Sidebar -->
    {% include 'navbar.html' %}

    <!-- Conteúdo Principal -->
    <main class="container-fluid px-3 px-md-4 mt-3 mt-lg-4 mb-5">
        {% if messages %}
        <div class="mb-3">
            {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <!-- Botão Dark Mode -->
    <div style="position:fixed;bottom:20px;left:20px;z-index:1050;">
        <button onclick="toggleDarkMode()"
                class="btn btn-dark shadow-sm d-flex align-items-center gap-1"
                style="border-radius:50px;">
            <i class="bi bi-moon-stars"></i>
            <span class="d-none d-sm-inline small">Modo Escuro</span>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }
        (function() {
            if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
        })();
        window.addEventListener('load', function() {
            const p = document.getElementById('preloader');
            p.style.opacity = '0';
            setTimeout(() => p.style.visibility = 'hidden', 300);
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
